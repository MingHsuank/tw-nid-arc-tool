<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW ID & UI No. Expert Tool</title>
    <link rel="icon" href="https://fav.farm/🇹🇼" />
    <style>
        :root { --primary: #4a90e2; --success: #27ae60; --error: #e74c3c; --bg: #f5f7fa; --dark: #2d3748; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 500px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: var(--dark); margin-top: 0; margin-bottom: 1.5rem; font-size: 1.4rem; border-left: 5px solid var(--primary); padding-left: 12px; }
        .group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #666; font-size: 0.9rem; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74,144,226,0.1); }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .btn-gen { background: var(--primary); }
        .btn-copy { background: var(--success); }
        .btn-check { background: var(--dark); width: 100%; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .result-display { margin-top: 1.5rem; padding: 1.5rem; background: #f8fafc; border-radius: 12px; text-align: center; border: 2px dashed #cbd5e0; }
        #display-id { font-family: 'Courier New', monospace; font-size: 2.2rem; font-weight: bold; color: var(--dark); letter-spacing: 2px; }
        .v-result { margin-top: 15px; padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; display: none; font-size: 1.1rem; }
        .v-success { background: #dcfce7; color: var(--success); border: 1px solid var(--success); }
        .v-error { background: #fee2e2; color: var(--error); border: 1px solid var(--error); }
        .footer { font-size: 0.8rem; color: #aaa; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>1. Generator</h2>
        <div class="group">
            <label>ID Type</label>
            <select id="type">
                <option value="nat">National ID (身分證)</option>
                <option value="new">Resident UI (New 新版居留證)</option>
                <option value="old">Resident UI (Legacy 舊版居留證)</option>
            </select>
        </div>
        <div class="group">
            <label>Region & Gender</label>
            <div style="display: flex; gap: 10px;">
                <select id="city" style="flex: 2;">
                    <option value="random">--- Random Region ---</option>
                    <optgroup label="Northern Taiwan">
                        <option value="A">Taipei City (台北市) (A)</option>
                        <option value="F">New Taipei City (新北市) (F)</option>
                        <option value="H">Taoyuan City (桃園市) (H)</option>
                        <option value="C">Keelung City (基隆市) (C)</option>
                        <option value="O">Hsinchu City (新竹市) (O)</option>
                        <option value="J">Hsinchu County (新竹縣) (J)</option>
                        <option value="Y">Yangmingshan (陽明山) (Y)</option>
                    </optgroup>
                    <optgroup label="Central Taiwan">
                        <option value="B">Taichung City (台中市) (B)</option>
                        <option value="K">Miaoli County (苗栗縣) (K)</option>
                        <option value="N">Changhua County (彰化縣) (N)</option>
                        <option value="M">Nantou County (南投縣) (M)</option>
                        <option value="L">Taichung County (台中縣) (L)</option>
                    </optgroup>
                    <optgroup label="Southern Taiwan">
                        <option value="E">Kaohsiung City (高雄市) (E)</option>
                        <option value="D">Tainan City (台南市) (D)</option>
                        <option value="I">Chiayi City (嘉義市) (I)</option>
                        <option value="Q">Chiayi County (嘉義縣) (Q)</option>
                        <option value="P">Yunlin County (雲林縣) (P)</option>
                        <option value="T">Pingtung County (屏東縣) (T)</option>
                        <option value="R">Tainan County (台南縣) (R)</option>
                        <option value="S">Kaohsiung County (高雄縣) (S)</option>
                    </optgroup>
                    <optgroup label="Eastern Taiwan & Islands">
                        <option value="G">Yilan County (宜蘭縣) (G)</option>
                        <option value="U">Hualien County (花蓮縣) (U)</option>
                        <option value="V">Taitung County (台東縣) (V)</option>
                        <option value="W">Kinmen County (金門縣) (W)</option>
                        <option value="X">Penghu County (澎湖縣) (X)</option>
                        <option value="Z">Lianjiang County (連江縣) (Z)</option>
                    </optgroup>
                </select>
                <select id="gender" style="flex: 1;">
                    <option value="random">Any</option>
                    <option value="M">Male</option><option value="F">Female</option>
                </select>
            </div>
        </div>
        <div class="btn-container">
            <button class="btn-gen" onclick="generate()">Generate</button>
            <button class="btn-copy" onclick="copyText()">Copy ID</button>
        </div>
        <div class="result-display">
            <span id="display-id">--------</span>
        </div>
    </div>

    <div class="card">
        <h2>2. Validator</h2>
        <div class="group">
            <label>Verify Identity / UI Number</label>
            <input type="text" id="input-id" placeholder="Paste ID here (e.g. A800000014)" maxlength="10">
        </div>
        <button class="btn-check" onclick="validate()">Run Check</button>
        <div id="v-msg" class="v-result"></div>
    </div>
    
    <div class="footer">TW ID Expert Tool | Internal Use Only</div>
</div>

<script>
    const cityMap = {'A':10,'B':11,'C':12,'D':13,'E':14,'F':15,'G':16,'H':17,'I':34,'J':18,'K':19,'L':20,'M':21,'N':22,'O':35,'P':23,'Q':24,'R':25,'S':26,'T':27,'U':28,'V':29,'W':32,'X':30,'Y':31,'Z':33};

    function checkAlgorithm(id) {
        id = id.toUpperCase().trim();
        if (!/^[A-Z][A-D890-9][0-9]{8}$/.test(id)) return false;
        const chars = id.split('');
        const n1 = cityMap[chars[0]];
        let nums = [Math.floor(n1/10), n1%10];
        if (isNaN(chars[1])) {
            nums.push(cityMap[chars[1]] % 10);
        } else {
            nums.push(parseInt(chars[1]));
        }
        for (let i = 2; i < 10; i++) nums.push(parseInt(chars[i]));
        const weights = [1, 9, 8, 7, 6, 5, 4, 3, 2, 1, 1];
        let total = 0;
        for (let i = 0; i < 10; i++) total += nums[i] * weights[i];
        return (total + nums[10]) % 10 === 0;
    }

    function generate() {
        const type = document.getElementById('type').value;
        let city = document.getElementById('city').value;
        const gender = document.getElementById('gender').value;
        if (city === 'random') city = Object.keys(cityMap)[Math.floor(Math.random() * 26)];
        const n1 = cityMap[city];
        let second;
        if (type === 'nat') second = (gender==='M')?1:(gender==='F')?2:(Math.random()<0.5?1:2);
        else if (type === 'new') second = (gender==='M')?8:(gender==='F')?9:(Math.random()<0.5?8:9);
        else {
            const isM = (gender==='M')||(Math.random()<0.5);
            second = isM?(Math.random()<0.5?'A':'C'):(Math.random()<0.5?'B':'D');
        }
        const stream = Array.from({length:7},()=>Math.floor(Math.random()*10));
        let full = [Math.floor(n1/10), n1%10, isNaN(second)?cityMap[second]%10:parseInt(second), ...stream];
        const weights = [1,9,8,7,6,5,4,3,2,1];
        let total = 0;
        full.forEach((n,i)=>total+=n*weights[i]);
        const check = (10-(total%10))%10;
        document.getElementById('display-id').innerText = `${city}${second}${stream.join('')}${check}`;
    }

    function validate() {
        const val = document.getElementById('input-id').value;
        const box = document.getElementById('v-msg');
        box.style.display = 'block';
        if (checkAlgorithm(val)) {
            box.innerText = "✓ Valid Format";
            box.className = "v-result v-success";
        } else {
            box.innerText = "✘ Invalid Format";
            box.className = "v-result v-error";
        }
    }

    function copyText() {
        const text = document.getElementById('display-id').innerText;
        if (text.includes('-')) return;
        navigator.clipboard.writeText(text).then(() => alert("Copied!"));
    }
</script>
</body>
</html>
